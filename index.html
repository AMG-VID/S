<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تيك ستور - متجر اللابتوبات والمعدات التقنية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(145deg, #f0f4f9 0%, #eef2f7 100%); color: #1a2634; padding-bottom: 40px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .header { background: #0f172a; box-shadow: 0 15px 30px -12px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo i { font-size: 2rem; color: #3b82f6; background: white; padding: 8px; border-radius: 20px; }
        .logo h1 { color: white; font-size: 1.7rem; font-weight: 800; }
        .logo span { color: #3b82f6; }
        .nav-links { display: flex; gap: 18px; flex-wrap: wrap; }
        .nav-btn { background: transparent; border: none; padding: 10px 22px; font-size: 1rem; font-weight: 600; border-radius: 40px; cursor: pointer; transition: 0.3s; color: #f1f5f9; display: flex; align-items: center; gap: 8px; }
        .nav-btn.active { background: #3b82f6; color: white; box-shadow: 0 6px 14px rgba(59,130,246,0.3); }
        .nav-btn:not(.active):hover { background: #1e293b; }
        .container { max-width: 1400px; margin: 30px auto; padding: 0 24px; }
        .card { background: rgba(255,255,255,0.95); border-radius: 32px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08); padding: 28px; border: 1px solid rgba(59,130,246,0.1); }
        .section-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 24px; border-right: 6px solid #3b82f6; padding-right: 20px; color: #0f172a; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 28px; margin-top: 20px; }
        .product-card { background: white; border-radius: 28px; overflow: hidden; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #eef2ff; }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 25px 35px -12px rgba(59,130,246,0.2); }
        .product-img { background: #f8fafc; height: 180px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; color: #3b82f6; }
        .product-info { padding: 20px; }
        .product-title { font-size: 1.3rem; font-weight: 800; }
        .product-price { font-size: 1.6rem; font-weight: 800; color: #2563eb; margin: 10px 0; }
        .stock-badge { display: inline-block; padding: 4px 12px; border-radius: 40px; font-size: 0.75rem; font-weight: bold; margin-bottom: 12px; }
        .stock-high { background: #dcfce7; color: #15803d; }
        .stock-low { background: #fee2e2; color: #b91c1c; }
        .btn-primary { background: #0f172a; border: none; padding: 10px 0; width: 100%; border-radius: 40px; font-weight: 700; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-primary:hover { background: #3b82f6; transform: scale(0.98); }
        .btn-outline { background: transparent; border: 2px solid #3b82f6; color: #3b82f6; padding: 8px 16px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .admin-table { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 8px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; font-weight: 800; }
        .action-icons i { font-size: 1.2rem; margin: 0 6px; cursor: pointer; }
        .edit-icon { color: #2563eb; }
        .delete-icon { color: #dc2626; }
        .stock-input { width: 70px; padding: 6px; border-radius: 20px; border: 1px solid #cbd5e1; text-align: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; max-width: 550px; width: 90%; border-radius: 40px; padding: 28px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { font-weight: 700; display: block; margin-bottom: 6px; }
        input, textarea, select { width: 100%; padding: 12px 16px; border-radius: 28px; border: 1px solid #cbd5e1; font-size: 1rem; }
        .flex-btns { display: flex; gap: 15px; justify-content: flex-end; }
        .toast-msg { position: fixed; bottom: 30px; left: 30px; background: #0f172a; color: white; padding: 12px 24px; border-radius: 60px; z-index: 1100; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .stat-card { background: white; border-radius: 28px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        @media (max-width: 700px) { .nav-container { flex-direction: column; } .section-title { font-size: 1.4rem; } }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="header">
    <div class="nav-container">
        <div class="logo"><i class="fas fa-microchip"></i><h1>تيك<span>ستور</span></h1></div>
        <div class="nav-links">
            <button class="nav-btn active" data-tab="store"><i class="fas fa-store"></i> المتجر</button>
            <button class="nav-btn" data-tab="admin"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</button>
            <button class="nav-btn" data-tab="backup"><i class="fas fa-database"></i> قاعدة البيانات</button>
        </div>
    </div>
</div>
<div class="container" id="appContainer"></div>

<script>
    // ---------- STORAGE KEYS ----------
    const STORAGE_PRODUCTS = "techstore_products";
    const STORAGE_ORDERS = "techstore_orders";
    const STORAGE_PASSWORD_HASH = "techstore_password_hash";
    const STORAGE_IS_FIRST_TIME = "techstore_first_time";

    // Default demo products
    let defaultProducts = [
        { id: "p1", name: "لابتوب ألين وير X16", price: 18500, stock: 12, category: "لاب توب", description: "معالج i9 الجيل 13، كرت شاشة RTX 4080، 32GB رام", imageIcon: "fa-laptop-code" },
        { id: "p2", name: "ماك بوك برو M3", price: 22999, stock: 8, category: "لاب توب", description: "شاشة Retina XDR، شريحة M3، بطارية 22 ساعة", imageIcon: "fa-apple" },
        { id: "p3", name: "شاشة منحنية 34 بوصة", price: 3200, stock: 5, category: "شاشات", description: "UWQHD، 165Hz، منحنية فائقة", imageIcon: "fa-tv" },
        { id: "p4", name: "كيس كمبيوتر i7 RTX 4070", price: 14500, stock: 4, category: "كمبيوتر مكتبي", description: "هارد 1TB NVMe، 16GB DDR5", imageIcon: "fa-desktop" },
        { id: "p5", name: "ماوس ألعاب برو", price: 450, stock: 25, category: "اكسسوارات", description: "ماوس لاسلكي 26000 DPI", imageIcon: "fa-mouse" },
        { id: "p6", name: "لابتوب ASUS TUF F15", price: 12500, stock: 3, category: "لاب توب", description: "i7-12700H، RTX 3060، 16GB", imageIcon: "fa-laptop" }
    ];

    // Helper functions
    function loadData() {
        let products = localStorage.getItem(STORAGE_PRODUCTS);
        if (!products) localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(defaultProducts));
        let orders = localStorage.getItem(STORAGE_ORDERS);
        if (!orders) localStorage.setItem(STORAGE_ORDERS, JSON.stringify([]));
        return {
            products: JSON.parse(localStorage.getItem(STORAGE_PRODUCTS)),
            orders: JSON.parse(localStorage.getItem(STORAGE_ORDERS))
        };
    }

    function saveProducts(products) { localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(products)); }
    function saveOrders(ordersArr) { localStorage.setItem(STORAGE_ORDERS, JSON.stringify(ordersArr)); }
    function addOrder(newOrder) { let { orders } = loadData(); orders.unshift(newOrder); saveOrders(orders); }

    function updateStockFromCart(cartItems) {
        let { products } = loadData();
        for (let item of cartItems) {
            let prod = products.find(p => p.id === item.id);
            if (!prod || prod.stock < item.qty) return false;
            prod.stock -= item.qty;
        }
        saveProducts(products);
        return true;
    }

    function showToast(msg, type = "success") {
        let toast = document.createElement("div");
        toast.className = "toast-msg";
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    // ---------- PASSWORD MANAGEMENT (SECURE - no hardcoded password) ----------
    function hashPassword(pwd) {
        // Simple hash (not for real security, but hides plain text from casual view)
        let hash = 0;
        for (let i = 0; i < pwd.length; i++) {
            hash = ((hash << 5) - hash) + pwd.charCodeAt(i);
            hash |= 0;
        }
        return hash.toString(16) + btoa(pwd).slice(0, 10); // extra obfuscation
    }

    function isFirstTimeSetup() {
        return !localStorage.getItem(STORAGE_PASSWORD_HASH);
    }

    function setupNewPassword() {
        let pwd = prompt("🔐 هذا أول استخدام للوحة التحكم. قم بتعيين كلمة مرور قوية للمالك (لن تظهر في الكود):");
        if (!pwd) return false;
        let confirmPwd = prompt("أعد كتابة كلمة المرور لتأكيدها:");
        if (pwd !== confirmPwd) { showToast("كلمتا المرور غير متطابقتين", "error"); return false; }
        if (pwd.length < 4) { showToast("كلمة المرور يجب أن تكون 4 أحرف على الأقل", "error"); return false; }
        localStorage.setItem(STORAGE_PASSWORD_HASH, hashPassword(pwd));
        showToast("تم تعيين كلمة مرور المالك بنجاح");
        return true;
    }

    function verifyPassword() {
        if (isFirstTimeSetup()) {
            return setupNewPassword();
        }
        let storedHash = localStorage.getItem(STORAGE_PASSWORD_HASH);
        let entered = prompt("🔐 أدخل كلمة مرور المالك للوصول إلى لوحة التحكم:");
        if (!entered) return false;
        if (hashPassword(entered) === storedHash) return true;
        showToast("كلمة المرور غير صحيحة", "error");
        return false;
    }

    function resetPassword() {
        if (confirm("⚠️ هل تريد إعادة تعيين كلمة مرور المالك؟ (ستحتاج إلى تعيين كلمة جديدة فوراً)")) {
            localStorage.removeItem(STORAGE_PASSWORD_HASH);
            showToast("تم حذف كلمة المرور القديمة. ستحتاج إلى تعيين جديدة عند دخول لوحة التحكم.");
            render(); // refresh UI
        }
    }

    let isAdminLogged = false; // session only

    function requireAdmin() {
        if (isAdminLogged) return true;
        if (verifyPassword()) {
            isAdminLogged = true;
            return true;
        }
        return false;
    }

    function logoutAdmin() { isAdminLogged = false; showToast("تم تسجيل الخروج من لوحة التحكم"); render(); }

    // Export / Import
    function exportDatabase() {
        let { products, orders } = loadData();
        let fullDB = { products, orders, exportDate: new Date().toISOString() };
        const dataStr = JSON.stringify(fullDB, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `techstore_db_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast("✅ تم تصدير قاعدة البيانات إلى جهازك");
    }

    function importDatabase(file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const imported = JSON.parse(evt.target.result);
                if (imported.products && Array.isArray(imported.products) && imported.orders) {
                    saveProducts(imported.products);
                    saveOrders(imported.orders);
                    showToast("🎉 تم استيراد قاعدة البيانات بنجاح!");
                    render();
                } else { showToast("ملف غير صالح", "error"); }
            } catch(e) { showToast("خطأ في قراءة الملف", "error"); }
        };
        reader.readAsText(file);
    }

    // Product management
    let editingProductId = null;
    function openProductModal(product = null) {
        if (!requireAdmin()) return;
        editingProductId = product ? product.id : null;
        document.getElementById("modalTitle").innerText = product ? "✏️ تعديل المنتج" : "➕ إضافة منتج جديد";
        document.getElementById("prodName").value = product ? product.name : "";
        document.getElementById("prodPrice").value = product ? product.price : "";
        document.getElementById("prodStock").value = product ? product.stock : "";
        document.getElementById("prodCategory").value = product ? product.category : "لاب توب";
        document.getElementById("prodDesc").value = product ? product.description : "";
        document.getElementById("prodIcon").value = product ? (product.imageIcon || "fa-laptop") : "fa-laptop";
        document.getElementById("productModal").style.display = "flex";
    }

    function saveProductModal() {
        let name = document.getElementById("prodName").value.trim();
        let price = parseFloat(document.getElementById("prodPrice").value);
        let stock = parseInt(document.getElementById("prodStock").value);
        let category = document.getElementById("prodCategory").value;
        let desc = document.getElementById("prodDesc").value;
        let icon = document.getElementById("prodIcon").value;
        if (!name || isNaN(price) || isNaN(stock)) { showToast("بيانات غير صحيحة", "error"); return; }
        let { products } = loadData();
        if (editingProductId) {
            let index = products.findIndex(p => p.id === editingProductId);
            if (index !== -1) {
                products[index] = { ...products[index], name, price, stock, category, description: desc, imageIcon: icon };
                saveProducts(products);
                showToast("تم تعديل المنتج");
            }
        } else {
            let newId = "p_" + Date.now() + "_" + Math.floor(Math.random()*10000);
            products.push({ id: newId, name, price, stock, category, description: desc, imageIcon: icon });
            saveProducts(products);
            showToast("تم إضافة المنتج");
        }
        closeModal();
        render();
    }

    function deleteProduct(id) { if (!requireAdmin()) return; if(confirm("حذف المنتج؟")) { let {products}=loadData(); saveProducts(products.filter(p=>p.id!==id)); showToast("تم الحذف"); render(); } }
    function updateStockDirectly(id, newStock) { if(!requireAdmin()) return; let {products}=loadData(); let p=products.find(p=>p.id===id); if(p){p.stock=Math.max(0,parseInt(newStock)||0); saveProducts(products); render(); showToast("تم تحديث المخزون");} }
    function closeModal() { document.getElementById("productModal").style.display = "none"; editingProductId=null; }

    // Cart
    let cart = [];
    function addToCart(product) {
        if (product.stock <= 0) { showToast("المنتج غير متوفر", "error"); return; }
        let existing = cart.find(i => i.id === product.id);
        if (existing) { if (existing.qty + 1 > product.stock) { showToast("الكمية أكبر من المخزون", "error"); return; } existing.qty++; }
        else { cart.push({ id: product.id, name: product.name, price: product.price, qty: 1 }); }
        showToast(`🛒 تم إضافة ${product.name}`);
        renderStoreView();
    }
    function removeFromCart(id) { cart = cart.filter(i => i.id !== id); renderStoreView(); }
    function updateCartQty(id, delta) {
        let item = cart.find(i => i.id === id);
        if (item) {
            let newQty = item.qty + delta;
            let prodStock = loadData().products.find(p => p.id === id)?.stock || 0;
            if (newQty <= 0) removeFromCart(id);
            else if (newQty <= prodStock) { item.qty = newQty; renderStoreView(); }
            else showToast("تجاوز المخزون", "error");
        }
    }
    function checkout() {
        if (cart.length === 0) { showToast("السلة فارغة", "error"); return; }
        let customerName = prompt("أدخل اسمك:", "عميل");
        if (!customerName) return;
        let { products } = loadData();
        for (let ci of cart) {
            let p = products.find(pr => pr.id === ci.id);
            if (!p || p.stock < ci.qty) { showToast(`نفاد المخزون: ${ci.name}`, "error"); return; }
        }
        let totalAmount = cart.reduce((s,i)=>s+(i.price*i.qty),0);
        let newOrder = { id: "ORD"+Date.now(), customer: customerName, date: new Date().toLocaleString('ar-EG'), items: cart.map(i=>({name:i.name,qty:i.qty,price:i.price})), total: totalAmount, status: "قيد المعالجة" };
        for (let ci of cart) { let prod = products.find(p=>p.id===ci.id); prod.stock -= ci.qty; }
        saveProducts(products);
        addOrder(newOrder);
        cart = [];
        showToast("✅ تم تأكيد الطلب");
        renderStoreView();
        if (currentTab === "admin") renderAdminView();
    }

    // UI rendering
    let currentTab = "store";

    function renderStoreView() {
        let { products } = loadData();
        let totalCartItems = cart.reduce((s,i)=>s+i.qty,0);
        let html = `<div class="card"><div class="section-title"><i class="fas fa-shopping-cart"></i> أحدث الأجهزة</div><div class="products-grid">`;
        products.forEach(prod => {
            let stockClass = prod.stock > 3 ? "stock-high" : "stock-low";
            html += `<div class="product-card"><div class="product-img"><i class="fas ${prod.imageIcon || 'fa-laptop'} fa-4x"></i></div>
            <div class="product-info"><div class="product-title">${prod.name}</div><div class="product-price">${prod.price.toLocaleString()} ج.م</div>
            <div class="stock-badge ${stockClass}">📦 ${prod.stock>0 ? `المتبقي: ${prod.stock}` : "غير متوفر"}</div>
            <div class="product-desc">${prod.description.substring(0,60)}</div>
            <button class="btn-primary" ${prod.stock<=0?'disabled':''} onclick='addToCart(${JSON.stringify(prod).replace(/'/g, "&#39;")})'><i class="fas fa-cart-plus"></i> أضف للسلة</button>
            </div></div>`;
        });
        html += `</div></div><div class="card"><div class="section-title"><i class="fas fa-shopping-basket"></i> سلة التسوق (${totalCartItems})</div>`;
        if(cart.length===0) html+="<p style='text-align:center'>السلة فارغة</p>";
        else {
            html+=`<div style="overflow-x:auto"><table width="100%"><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>الإجمالي</th><th></th></tr>`;
            cart.forEach(item=>{
                html+=`<tr><td>${item.name}</td><td>${item.price} ج.م</td><td><button class="btn-outline" style="padding:4px 10px" onclick="updateCartQty('${item.id}',-1)">-</button> ${item.qty} <button class="btn-outline" style="padding:4px 10px" onclick="updateCartQty('${item.id}',1)">+</button></td><td>${(item.price*item.qty).toLocaleString()} ج.م</td><td><i class="fas fa-trash-alt" style="color:#dc2626;cursor:pointer" onclick="removeFromCart('${item.id}')"></i></td></tr>`;
            });
            let total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
            html+=`<tr><td colspan="3"><strong>الإجمالي الكلي</strong></td><td colspan="2"><strong>${total.toLocaleString()} ج.م</strong></td></tr></table></div>
            <button class="btn-primary" style="background:#2563eb; margin-top:20px" onclick="checkout()"><i class="fas fa-credit-card"></i> إتمام الشراء</button>`;
        }
        html+=`</div>`;
        document.getElementById("appContainer").innerHTML = html;
    }

    function renderAdminView() {
        if (!requireAdmin()) { render(); return; }
        let { products, orders } = loadData();
        let lowStockCount = products.filter(p=>p.stock<=3).length;
        let totalValue = products.reduce((s,p)=>s+(p.price*p.stock),0);
        let html = `<div class="card"><div class="section-title"><i class="fas fa-chart-line"></i> نظرة سريعة</div>
        <div style="display:flex; gap:15px; flex-wrap:wrap">${[
            ['box', 'إجمالي المنتجات', products.length], ['exclamation-triangle', 'منتجات منخفضة', lowStockCount], ['chart-simple', 'قيمة المخزون', totalValue.toLocaleString()+' ج.م'], ['truck-fast', 'الطلبات', orders.length]
        ].map(([icon,label,val])=>`<div class="stat-card"><div><i class="fas fa-${icon} fa-2x"></i><br>${label}</div><strong style="font-size:1.8rem">${val}</strong></div>`).join('')}</div>
        <div style="margin:20px 0"><button class="btn-primary" style="background:#0f172a; width:auto" onclick="openProductModal(null)"><i class="fas fa-plus"></i> إضافة منتج جديد</button>
        <button class="btn-outline" style="margin-right:10px" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج المالك</button></div>
        <div class="section-title"><i class="fas fa-edit"></i> إدارة المنتجات والمخزون</div>
        <div class="admin-table"><table><thead><tr><th>الصورة</th><th>المنتج</th><th>السعر</th><th>المخزون</th><th>تعديل</th><th>إجراءات</th></tr></thead><tbody>`;
        products.forEach(p=>{
            html+=`<tr><td><i class="fas ${p.imageIcon||'fa-laptop'}"></i></td><td>${p.name}</td><td>${p.price} ج.م</td><td class="${p.stock<=3?'stock-low':''}">${p.stock}</td>
            <td><input type="number" class="stock-input" id="stock-${p.id}" value="${p.stock}" min="0"><button class="btn-outline" style="padding:4px 12px" onclick="updateStockDirectly('${p.id}',document.getElementById('stock-${p.id}').value)"><i class="fas fa-sync-alt"></i></button></td>
            <td class="action-icons"><i class="fas fa-edit edit-icon" onclick='openProductModal(${JSON.stringify(p).replace(/'/g, "&#39;")})'></i> <i class="fas fa-trash-alt delete-icon" onclick="deleteProduct('${p.id}')"></i></td></tr>`;
        });
        html+=`</tbody></table></div><div class="section-title"><i class="fas fa-clipboard-list"></i> الطلبات الواردة</div><div class="admin-table"><table><tr><th>رقم الطلب</th><th>العميل</th><th>التاريخ</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th></tr>`;
        if(orders.length===0) html+="<tr><td colspan='6'>لا توجد طلبات</td></tr>";
        orders.forEach(o=>{ html+=`<tr><td>${o.id}</td><td>${o.customer}</td><td>${o.date}</td><td>${o.items.map(i=>`${i.name} (${i.qty})`).join(', ').substring(0,50)}</td><td>${o.total.toLocaleString()} ج.م</td><td>${o.status}</td></tr>`; });
        html+=`</table></div></div>`;
        document.getElementById("appContainer").innerHTML = html;
    }

    function renderBackupView() {
        let html = `<div class="card"><div class="section-title"><i class="fas fa-database"></i> قاعدة البيانات - ملكية المالك</div>
        <p>🔐 جميع البيانات مخزنة محلياً. يمكنك تصديرها إلى ملف JSON وحفظها على جهازك، واستيرادها لاحقاً.</p>
        <div style="display:flex; gap:15px; flex-wrap:wrap; margin:20px 0"><button class="btn-primary" onclick="exportDatabase()"><i class="fas fa-download"></i> تصدير قاعدة البيانات</button>
        <label class="btn-primary" style="background:#3b82f6; cursor:pointer"><i class="fas fa-upload"></i> استيراد ملف JSON <input type="file" accept=".json" style="display:none" id="importFileInput"></label>
        <button class="btn-primary" style="background:#2d3a4b" onclick="resetPassword()"><i class="fas fa-key"></i> إعادة تعيين كلمة المرور</button>
        <button class="btn-primary" style="background:#991b1b" onclick="localStorage.clear(); saveProducts(defaultProducts); saveOrders([]); cart=[]; showToast('تم إعادة ضبط البيانات للعينة الافتراضية'); render();"><i class="fas fa-undo-alt"></i> استعادة العينات</button>
        </div><hr><p><i class="fas fa-shield-alt"></i> كلمة مرور المالك غير موجودة في الكود، أنت من يتحكم بها.</p></div>`;
        document.getElementById("appContainer").innerHTML = html;
        document.getElementById("importFileInput")?.addEventListener("change", e => { if(e.target.files.length) importDatabase(e.target.files[0]); });
    }

    function render() {
        if (currentTab === "store") renderStoreView();
        else if (currentTab === "admin") renderAdminView();
        else renderBackupView();
        attachNavEvents();
    }

    function attachNavEvents() {
        document.querySelectorAll(".nav-btn").forEach(btn => {
            btn.removeEventListener("click", navHandler);
            btn.addEventListener("click", navHandler);
        });
    }
    function navHandler(e) {
        let tab = e.currentTarget.getAttribute("data-tab");
        if(tab === "admin" && !requireAdmin()) { currentTab = "store"; render(); return; }
        currentTab = tab;
        document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active"));
        e.currentTarget.classList.add("active");
        render();
    }

    window.addToCart = addToCart; window.removeFromCart = removeFromCart; window.updateCartQty = updateCartQty; window.checkout = checkout;
    window.openProductModal = openProductModal; window.saveProductModal = saveProductModal; window.closeModal = closeModal;
    window.deleteProduct = deleteProduct; window.updateStockDirectly = updateStockDirectly; window.exportDatabase = exportDatabase;
    window.importDatabase = importDatabase; window.logoutAdmin = logoutAdmin; window.resetPassword = resetPassword;
    render();

    let modalHtml = `<div id="productModal" class="modal"><div class="modal-content"><h3 id="modalTitle">منتج</h3><div class="form-group"><label>اسم المنتج</label><input id="prodName"></div>
    <div class="form-group"><label>السعر (ج.م)</label><input id="prodPrice" type="number"></div><div class="form-group"><label>الكمية</label><input id="prodStock" type="number"></div>
    <div class="form-group"><label>التصنيف</label><select id="prodCategory"><option>لاب توب</option><option>كمبيوتر مكتبي</option><option>شاشات</option><option>اكسسوارات</option></select></div>
    <div class="form-group"><label>الوصف</label><textarea id="prodDesc" rows="2"></textarea></div><div class="form-group"><label>أيقونة (رمز FontAwesome)</label><input id="prodIcon" value="fa-laptop"></div>
    <div class="flex-btns"><button class="btn-outline" onclick="closeModal()">إلغاء</button><button class="btn-primary" onclick="saveProductModal()">حفظ</button></div></div></div>`;
    document.body.insertAdjacentHTML("beforeend", modalHtml);
</script>
<div class="footer-credit"><p><i class="fas fa-shield-alt"></i> بيانات المتجر محفوظة بجهاز المالك | كلمة المرور خاصة بك ولا توجد في الكود</p></div>
</body>
</html>
